server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Same-origin API: backend Service is named `backend` on :3000 (deploy contract).
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Known vue-router SPA routes -> serve index.html so deep links / reloads work.
  # NOTE: this is an explicit allow-list (NOT a blanket try_files fallback) so that
  # genuinely unknown paths (e.g. /foo) return a real 404 instead of the SPA shell.
  location = /                { try_files /index.html =404; }
  location = /bookmarks       { try_files /index.html =404; }
  location = /bookmarks/new   { try_files /index.html =404; }
  location = /about           { try_files /index.html =404; }
  location = /login           { try_files /index.html =404; }
  location = /signup          { try_files /index.html =404; }
  location = /admin/login     { try_files /index.html =404; }
  location = /admin/settings  { try_files /index.html =404; }

  # Everything else: serve the real static file if it exists (hashed /assets/*, favicon,
  # etc.), otherwise return a genuine 404. Unmatched routes never fall back to index.html.
  location / {
    try_files $uri =404;
  }
}
